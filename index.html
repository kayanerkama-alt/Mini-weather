            --accent: #00c853; --accent-light: #69f0ae; --accent-glow: rgba(0,200,83,0.2);
            --border: #c0f0d8; --border-light: #d8f8e8;

        /* ===== SAFE AREA ===== */
        @supports (padding: max(0px)) {
            body { padding: var(--safe-top) var(--safe-right) var(--safe-bottom) var(--safe-left); }
        }

        /* ===== BODY ===== */
        body {
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            transition: background 0.4s ease, color 0.4s ease;
            min-height: 100vh;
        }

        /* ===== APP LAYOUT ===== */
        #app {
            min-height: 100vh;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 14px;
            max-width: 1400px;
            margin: 0 auto;
        }

        /* ===== HEADER ===== */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 300;
            letter-spacing: 1px;
            font-size: 1.1rem;
            flex-shrink: 0;
        }

        .logo-icon { font-size: 1.4rem; animation: pulse 3s ease-in-out infinite; }
        @keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.1); } }

        .controls {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            align-items: center;
        }

        /* ===== BUTTONS ===== */
        button {
            padding: 8px 12px;
            border: 1px solid var(--border-light);
            background: var(--bg-card);
            color: var(--text);
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-size: 0.82rem;
            font-weight: 500;
            transition: var(--transition);
            min-height: 40px;
            min-width: 40px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            white-space: nowrap;
            -webkit-user-select: none;
            user-select: none;
        }

        button:active { transform: scale(0.94); }
        button:hover { background: var(--accent); border-color: var(--accent); color: #fff; }
        button:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

        .btn-primary {
            background: var(--accent);
            border-color: var(--accent);
            color: #fff;
        }
        .btn-primary:hover { opacity: 0.85; }

        /* ===== THEME PICKER ===== */
        .theme-wrapper {
            position: relative;
        }

        #theme-dropdown {
            display: none;
            position: absolute;
            top: calc(100% + 6px);
            right: 0;
            background: var(--bg-card);
            border: 1px solid var(--border-light);
            border-radius: var(--radius);
            padding: 10px;
            z-index: 500;
            width: 280px;
            max-height: 320px;
            overflow-y: auto;
            box-shadow: var(--shadow);
            animation: fadeIn 0.2s ease;
        }

        #theme-dropdown.active { display: block; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: translateY(0); } }

        .theme-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 6px;
        }

        .theme-swatch {
            width: 36px;
            height: 36px;
            border-radius: 6px;
            cursor: pointer;
            border: 2px solid transparent;
            transition: var(--transition);
            position: relative;
            overflow: hidden;
        }

        .theme-swatch:hover { transform: scale(1.15); border-color: var(--text); }
        .theme-swatch.active { border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent-glow); }

        .theme-swatch::after {
            content: attr(title);
            position: absolute;
            bottom: -28px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--bg-card);
            color: var(--text);
            font-size: 0.65rem;
            padding: 2px 6px;
            border-radius: 4px;
            white-space: nowrap;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.2s;
            z-index: 10;
            border: 1px solid var(--border);
        }

        .theme-swatch:hover::after { opacity: 1; }

        /* ===== LOCATION SECTION ===== */
        .location-section {
            background: linear-gradient(135deg, var(--bg-card) 0%, rgba(255,255,255,0.03) 100%);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 14px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .location-info { display: flex; flex-direction: column; gap: 3px; }
        .location-name { font-weight: 600; font-size: 0.95rem; }
        .location-coords { font-size: 0.72rem; color: var(--text-dim); }
        .location-time { font-size: 0.68rem; color: var(--text-muted); }

        .location-meta {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        .source-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 3px 10px;
            background: var(--accent-glow);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            font-size: 0.65rem;
            color: var(--accent-light);
        }

        /* ===== MAIN CONTAINER ===== */
        .main-container {
            display: grid;
            grid-template-columns: 1fr;
            gap: 14px;
            flex: 1;
        }

        /* ===== WEATHER CARD ===== */
        .weather-card {
            background: linear-gradient(135deg, var(--bg-card) 0%, rgba(255,255,255,0.03) 100%);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 22px;
            animation: slideIn 0.5s ease-out;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(16px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ===== TEMPERATURE DISPLAY ===== */
        .temp-display { text-align: center; margin: 16px 0; }

        .temp-value {
            font-size: 4.5rem;
            font-weight: 200;
            line-height: 1;
            background: linear-gradient(135deg, var(--accent-light), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -2px;
        }

        .weather-icon-main { font-size: 3rem; margin: 8px 0; display: block; }
        .condition { font-size: 1rem; color: var(--text-dim); margin: 6px 0; text-transform: capitalize; }
        .feels-like { font-size: 0.82rem; color: var(--text-muted); }

        /* ===== STATS GRID ===== */
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(88px, 1fr));
            gap: 10px;
            margin-top: 18px;
            padding-top: 18px;
            border-top: 1px solid var(--border);
        }

        .stat {
            padding: 11px 8px;
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            text-align: center;
            transition: var(--transition);
        }

        .stat:hover { border-color: var(--accent); background: var(--accent-glow); }
        .stat-label { font-size: 0.62rem; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-dim); margin-bottom: 5px; }
        .stat-value { font-size: 1.1rem; font-weight: 600; color: var(--accent-light); }
        .stat-unit { font-size: 0.6rem; color: var(--text-muted); margin-top: 2px; }

        /* ===== SECTION TITLE ===== */
        .section-title {
            font-size: 0.9rem;
            font-weight: 600;
            margin: 18px 0 10px 0;
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text);
        }

        .section-title::before {
            content: '';
            width: 3px;
            height: 14px;
            background: var(--accent);
            border-radius: 2px;
            flex-shrink: 0;
        }

        /* ===== HOURLY FORECAST ===== */
        .hourly {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding: 8px 0 12px;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: thin;
            scrollbar-color: var(--border) transparent;
        }

        .hourly::-webkit-scrollbar { height: 4px; }
        .hourly::-webkit-scrollbar-track { background: transparent; }
        .hourly::-webkit-scrollbar-thumb { background: var(--border-light); border-radius: 2px; }

        .hour {
            flex-shrink: 0;
            padding: 10px 8px;
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            text-align: center;
            min-width: 70px;
            transition: var(--transition);
        }

        .hour:hover { border-color: var(--accent); background: var(--accent-glow); }
        .hour-time { font-size: 0.68rem; color: var(--text-dim); margin-bottom: 5px; }
        .hour-icon { font-size: 1.3rem; margin: 4px 0; }
        .hour-temp { font-size: 0.88rem; font-weight: 600; color: var(--accent-light); }
        .hour-precip { font-size: 0.62rem; color: var(--text-muted); margin-top: 3px; }

        /* ===== DAILY FORECAST ===== */
        .daily {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(105px, 1fr));
            gap: 10px;
            margin-top: 10px;
        }

        .day {
            padding: 12px 10px;
            background: linear-gradient(135deg, var(--bg-card) 0%, rgba(255,255,255,0.02) 100%);
            border: 1px solid var(--border);
            border-radius: 10px;
            text-align: center;
            transition: var(--transition);
        }

        .day:hover { border-color: var(--accent); transform: translateY(-2px); box-shadow: 0 4px 16px var(--accent-glow); }
        .day-date { font-size: 0.72rem; color: var(--text-dim); margin-bottom: 6px; }
        .day-icon { font-size: 1.7rem; margin: 6px 0; }
        .day-condition { font-size: 0.62rem; color: var(--text-muted); margin-bottom: 6px; }
        .day-temps { display: flex; justify-content: space-around; font-size: 0.78rem; margin-top: 6px; }
        .day-max { color: var(--accent-light); font-weight: 600; }
        .day-min { color: var(--text-dim); }
        .day-precip { font-size: 0.62rem; color: var(--text-muted); margin-top: 4px; }

        /* ===== ALERTS ===== */
        .alerts { display: flex; flex-direction: column; gap: 8px; margin-top: 14px; }

        .alert {
            padding: 10px 14px;
            border-radius: var(--radius-sm);
            border-left: 3px solid;
            font-size: 0.78rem;
            animation: slideIn 0.3s ease-out;
            line-height: 1.4;
        }

        .alert-warning { background: rgba(255,152,0,0.1); border-left-color: var(--warning); color: #ffb74d; }
        .alert-danger { background: rgba(244,67,54,0.1); border-left-color: var(--danger); color: #ef5350; }
        .alert-info { background: rgba(30,136,229,0.1); border-left-color: var(--accent); color: var(--accent-light); }

        /* ===== DETAILED STATS ===== */
        .detailed-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 10px;
            margin-top: 10px;
        }

        .detail-card {
            padding: 14px;
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            transition: var(--transition);
        }

        .detail-card:hover { border-color: var(--accent); background: var(--accent-glow); }
        .detail-title { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-dim); margin-bottom: 6px; }
        .detail-value { font-size: 1.3rem; font-weight: 600; color: var(--accent-light); }
        .detail-sub { font-size: 0.68rem; color: var(--text-muted); margin-top: 4px; }

        /* ===== GARDEN SECTION ===== */
        .garden-card {
            background: linear-gradient(135deg, var(--bg-card) 0%, rgba(255,255,255,0.03) 100%);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 20px;
            animation: slideIn 0.5s ease-out 0.1s both;
        }

        .garden-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .garden-title {
            font-size: 0.9rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .garden-title::before {
            content: '';
            width: 3px;
            height: 14px;
            background: var(--success);
            border-radius: 2px;
        }

        .garden-streak {
            font-size: 0.72rem;
            color: var(--text-dim);
            background: rgba(76,175,80,0.1);
            border: 1px solid rgba(76,175,80,0.2);
            padding: 3px 10px;
            border-radius: 20px;
        }

        .garden-scene {
            display: flex;
            align-items: flex-end;
            justify-content: center;
            gap: 12px;
            padding: 20px 10px;
            background: rgba(255,255,255,0.02);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            min-height: 120px;
            position: relative;
            overflow: hidden;
        }

        .garden-ground {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 24px;
            background: linear-gradient(to top, rgba(76,175,80,0.15), transparent);
            border-top: 1px solid rgba(76,175,80,0.2);
        }

        .garden-plant {
            font-size: 3rem;
            animation: sway 4s ease-in-out infinite;
            cursor: default;
            position: relative;
            z-index: 1;
            transition: font-size 0.5s ease;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.3));
        }

        .garden-plant.small { font-size: 1.8rem; }
        .garden-plant.medium { font-size: 2.5rem; }
        .garden-plant.large { font-size: 3.2rem; }
        .garden-plant.xlarge { font-size: 4rem; }

        @keyframes sway {
            0%, 100% { transform: rotate(-3deg) translateY(0); }
            25% { transform: rotate(3deg) translateY(-3px); }
            50% { transform: rotate(-2deg) translateY(-1px); }
            75% { transform: rotate(2deg) translateY(-4px); }
        }

        .garden-plant.wilted { animation: droop 3s ease-in-out infinite; }
        @keyframes droop {
            0%, 100% { transform: rotate(-8deg) translateY(2px); }
            50% { transform: rotate(-5deg) translateY(0); }
        }

        .garden-plant.thriving { animation: bounce 2s ease-in-out infinite; }
        @keyframes bounce {
            0%, 100% { transform: scale(1) translateY(0); }
            50% { transform: scale(1.05) translateY(-6px); }
        }

        .garden-deco {
            font-size: 1.2rem;
            position: relative;
            z-index: 1;
            animation: sway 5s ease-in-out infinite reverse;
        }

        .garden-info {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 14px;
        }

        .garden-stat {
            padding: 10px 12px;
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
        }

        .garden-stat-label { font-size: 0.62rem; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-dim); margin-bottom: 4px; }
        .garden-stat-value { font-size: 1rem; font-weight: 600; color: var(--success); }

        .garden-conditions {
            margin-top: 12px;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .garden-condition-item {
            font-size: 0.75rem;
            color: var(--text-dim);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .garden-status-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.78rem;
            font-weight: 600;
            margin-top: 10px;
        }

        .status-thriving { background: rgba(76,175,80,0.15); border: 1px solid rgba(76,175,80,0.3); color: #81c784; }
        .status-healthy { background: rgba(139,195,74,0.15); border: 1px solid rgba(139,195,74,0.3); color: #aed581; }
        .status-stressed { background: rgba(255,152,0,0.15); border: 1px solid rgba(255,152,0,0.3); color: #ffb74d; }
        .status-wilted { background: rgba(244,67,54,0.15); border: 1px solid rgba(244,67,54,0.3); color: #ef9a9a; }

        /* ===== LOADING ===== */
        .loading {
            text-align: center;
            padding: 50px 20px;
            animation: fadeIn 0.3s ease;
        }

        .spinner {
            width: 44px;
            height: 44px;
            border: 3px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.9s linear infinite;
            margin: 0 auto 18px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .loading-text { color: var(--text-dim); font-size: 0.88rem; }

        /* ===== ERROR ===== */
        .error {
            background: rgba(244,67,54,0.08);
            border: 1px solid rgba(244,67,54,0.3);
            color: #ef5350;
            padding: 18px;
            border-radius: var(--radius);
            text-align: center;
            animation: slideIn 0.3s ease;
        }

        .error-title { font-weight: 600; margin-bottom: 8px; }
        .error-msg { font-size: 0.82rem; color: #e57373; margin-bottom: 14px; }

        /* ===== MODAL ===== */
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.75);
            z-index: 1000;
            overflow-y: auto;
            padding: 20px;
            backdrop-filter: blur(4px);
        }

        .modal.active { display: flex; align-items: center; justify-content: center; }

        .modal-content {
            background: var(--bg-card);
            border: 1px solid var(--border-light);
            border-radius: var(--radius);
            padding: 22px;
            max-width: 420px;
            width: 100%;
            max-height: 85vh;
            overflow-y: auto;
            animation: fadeIn 0.25s ease;
            box-shadow: var(--shadow);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .modal-title { font-size: 1rem; font-weight: 600; }

        .modal-close {
            background: none;
            border: none;
            color: var(--text-dim);
            font-size: 1.2rem;
            cursor: pointer;
            padding: 4px;
            min-height: auto;
            min-width: auto;
        }

        .modal-close:hover { color: var(--text); background: none; }

        .api-option {
            padding: 12px 14px;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            margin-bottom: 8px;
            cursor: pointer;
            transition: var(--transition);
        }

        .api-option:hover { background: var(--accent-glow); border-color: var(--accent); }
        .api-option.selected { background: var(--accent-glow); border-color: var(--accent); }
        .api-name { font-weight: 600; font-size: 0.88rem; display: flex; align-items: center; gap: 6px; }
        .api-desc { font-size: 0.72rem; color: var(--text-dim); margin-top: 3px; }
        .api-badge { font-size: 0.6rem; padding: 2px 6px; border-radius: 10px; background: var(--accent); color: #fff; }

        /* ===== FOOTER ===== */
        footer {
            text-align: center;
            padding: 14px 0;
            border-top: 1px solid var(--border);
            color: var(--text-muted);
            font-size: 0.7rem;
        }

        /* ===== NOTIFICATION TOAST ===== */
        .toast {
            position: fixed;
            bottom: calc(var(--safe-bottom) + 16px);
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--bg-card);
            border: 1px solid var(--border-light);
            color: var(--text);
            padding: 10px 20px;
            border-radius: 24px;
            font-size: 0.82rem;
            z-index: 2000;
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: var(--shadow);
            white-space: nowrap;
        }

        .toast.show { transform: translateX(-50%) translateY(0); }

        /* ===== DEVICE BADGE ===== */
        .device-badge {
            font-size: 0.62rem;
            color: var(--text-muted);
            padding: 2px 8px;
            border: 1px solid var(--border);
            border-radius: 10px;
        }

        /* ===== RESPONSIVE: MOBILE ===== */
        @media (max-width: 480px) {
            #app { padding: 10px; gap: 10px; }
            .logo { font-size: 0.95rem; }
            .logo-icon { font-size: 1.2rem; }
            .controls { gap: 4px; }
            button { padding: 7px 9px; font-size: 0.78rem; min-height: 44px; min-width: 44px; }
            .temp-value { font-size: 3.5rem; }
            .weather-icon-main { font-size: 2.5rem; }
            .stats { grid-template-columns: repeat(3, 1fr); gap: 7px; }
            .stat { padding: 9px 6px; }
            .stat-value { font-size: 1rem; }
            .daily { grid-template-columns: repeat(auto-fit, minmax(90px, 1fr)); gap: 8px; }
            .day { padding: 10px 8px; }
            .detailed-grid { grid-template-columns: repeat(2, 1fr); }
            .garden-info { grid-template-columns: 1fr 1fr; }
            .weather-card { padding: 16px; }
            .garden-card { padding: 16px; }
            #theme-dropdown { width: 240px; right: -10px; }
            .theme-grid { grid-template-columns: repeat(5, 1fr); }
            .theme-swatch { width: 32px; height: 32px; }
        }

        /* ===== RESPONSIVE: TABLET ===== */
        @media (min-width: 481px) and (max-width: 1023px) {
            #app { padding: 14px; }
            .stats { grid-template-columns: repeat(5, 1fr); }
            .daily { grid-template-columns: repeat(auto-fit, minmax(100px, 1fr)); }
            .detailed-grid { grid-template-columns: repeat(3, 1fr); }
        }

        /* ===== RESPONSIVE: DESKTOP ===== */
        @media (min-width: 1024px) {
            #app { padding: 20px 24px; gap: 16px; }
            .main-container { grid-template-columns: 1fr 1fr; gap: 16px; }
            .weather-card { padding: 28px; }
            .garden-card { padding: 24px; }
            .temp-value { font-size: 5rem; }
            .stats { grid-template-columns: repeat(5, 1fr); }
            .daily { grid-template-columns: repeat(7, 1fr); }
            .detailed-grid { grid-template-columns: repeat(4, 1fr); }
            button { min-height: 38px; }
            .hour { min-width: 76px; }
        }

        /* ===== LANDSCAPE MOBILE ===== */
        @media (max-width: 900px) and (orientation: landscape) {
            .temp-value { font-size: 2.8rem; }
            .weather-icon-main { font-size: 2rem; }
            .stats { grid-template-columns: repeat(5, 1fr); }
            .garden-scene { min-height: 80px; }
        }

        /* ===== WIDE DESKTOP ===== */
        @media (min-width: 1280px) {
            .main-container { grid-template-columns: 3fr 2fr; }
            .stats { grid-template-columns: repeat(5, 1fr); }
        }

        /* ===== HOVER EFFECTS (desktop only) ===== */
        @media (hover: hover) {
            .hour:hover { transform: translateY(-3px); }
            .stat:hover { transform: translateY(-2px); }
        }

        /* ===== SCROLLBAR ===== */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border-light); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }
    </style>
</head>
<body>

<div id="app">
    <header>
        <div class="logo">
            <span class="logo-icon">☀️</span>
            <span>Mini Weather</span>
        </div>
        <div class="controls">
            <button id="location-btn" title="Get Location" aria-label="Get Location">📍</button>
            <button id="refresh-btn" title="Refresh" aria-label="Refresh">🔄</button>
            <button id="unit-btn" title="Toggle °C/°F" aria-label="Toggle units">°C</button>
            <button id="notify-btn" title="Notifications" aria-label="Enable notifications">🔔</button>
            <div class="theme-wrapper">
                <button id="theme-btn" title="Change Theme" aria-label="Change theme">🎨</button>
                <div id="theme-dropdown">
                    <div class="theme-grid" id="theme-grid"></div>
                </div>
            </div>
            <button id="api-btn" title="API Source" aria-label="Change API source">🔌</button>
        </div>
    </header>

    <div id="location-display" class="location-section" style="display:none;">
        <div class="location-info">
            <div class="location-name" id="loc-name">Loading...</div>
            <div class="location-coords" id="loc-coords">—</div>
            <div class="location-time" id="loc-time">—</div>
        </div>
        <div class="location-meta">
            <span class="source-badge" id="source-badge">📡 —</span>
            <span class="device-badge" id="device-badge">—</span>
        </div>
    </div>

    <div id="weather-content" class="main-container">
        <div class="loading">
            <div class="spinner"></div>
            <p class="loading-text">Tap 📍 to get your weather</p>
        </div>
    </div>

    <footer>
        <p>Mini Weather &bull; Privacy-First &bull; No Tracking &bull; <span id="footer-api">Open-Meteo</span></p>
    </footer>
</div>

<!-- API Modal -->
<div id="api-modal" class="modal" role="dialog" aria-modal="true" aria-label="Select API Source">
    <div class="modal-content">
        <div class="modal-header">
            <div class="modal-title">🔌 Weather Data Source</div>
            <button class="modal-close" id="api-modal-close" aria-label="Close">✕</button>
        </div>
        <div id="api-list"></div>
    </div>
</div>

<!-- Toast -->
<div class="toast" id="toast" role="status" aria-live="polite"></div>

<script src="app.js"></script>
</body>
</html>
