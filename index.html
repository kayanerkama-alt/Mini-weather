<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <meta name="description" content="Mini Weather - Fast, Accurate, AI-Powered Weather">
    <meta name="theme-color" content="#1e88e5">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Mini Weather</title>
    <link rel="manifest" href="manifest.json">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html { -webkit-user-select: none; user-select: none; }
        body { -webkit-user-select: text; user-select: text; }

        :root {
            --safe-top: max(12px, env(safe-area-inset-top));
            --safe-bottom: max(12px, env(safe-area-inset-bottom));
            --safe-left: max(12px, env(safe-area-inset-left));
            --safe-right: max(12px, env(safe-area-inset-right));
            --bg: #0a0a0a;
            --bg-alt: #1a1a1a;
            --text: #ffffff;
            --text-dim: #b0b0b0;
            --accent: #1e88e5;
            --border: #333333;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @supports (padding: max(0px)) {
            body { padding: var(--safe-top) var(--safe-right) var(--safe-bottom) var(--safe-left); }
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        #app {
            min-height: 100vh;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 300;
            letter-spacing: 1px;
            font-size: 1.1rem;
        }

        .controls {
            display: flex;
            gap: 8px;
        }

        button {
            padding: 8px 12px;
            border: 1px solid var(--border);
            background: var(--bg-alt);
            color: var(--text);
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 500;
            transition: var(--transition);
            min-height: 44px;
            min-width: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        button:active { transform: scale(0.95); }
        button:hover { background: var(--accent); border-color: var(--accent); }
        button:disabled { opacity: 0.5; cursor: not-allowed; }

        .location-section {
            background: linear-gradient(135deg, var(--bg-alt) 0%, rgba(255,255,255,0.05) 100%);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .location-info {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .location-name { font-weight: 600; font-size: 1rem; }
        .location-coords { font-size: 0.75rem; color: var(--text-dim); }
        .location-time { font-size: 0.7rem; color: var(--text-dim); opacity: 0.7; }

        .main-container {
            display: grid;
            grid-template-columns: 1fr;
            gap: 16px;
            flex: 1;
        }

        .weather-card {
            background: linear-gradient(135deg, var(--bg-alt) 0%, rgba(255,255,255,0.05) 100%);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 24px;
            animation: slideIn 0.6s ease-out;
        }

        @keyframes slideIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .temp-display {
            text-align: center;
            margin: 20px 0;
        }

        .temp-value {
            font-size: 4rem;
            font-weight: 200;
            background: linear-gradient(135deg, #64b5f6, var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .condition { font-size: 1rem; color: var(--text-dim); margin: 8px 0; text-transform: capitalize; }
        .feels-like { font-size: 0.85rem; color: var(--text-dim); }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(90px, 1fr));
            gap: 12px;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid var(--border);
        }

        .stat {
            padding: 12px;
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--border);
            border-radius: 8px;
            text-align: center;
        }

        .stat-label { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-dim); margin-bottom: 6px; }
        .stat-value { font-size: 1.2rem; font-weight: 600; color: #64b5f6; }

        .insights-section {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid var(--border);
        }

        .section-title {
            font-size: 0.95rem;
            font-weight: 600;
            margin: 20px 0 12px 0;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .section-title::before { content: ''; width: 3px; height: 16px; background: var(--accent); border-radius: 2px; }

        .hourly {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding: 10px 0;
            -webkit-overflow-scrolling: touch;
        }

        .hour {
            flex-shrink: 0;
            padding: 12px 10px;
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--border);
            border-radius: 8px;
            text-align: center;
            min-width: 75px;
        }

        .hour-time { font-size: 0.7rem; color: var(--text-dim); margin-bottom: 6px; }
        .hour-icon { font-size: 1.4rem; margin: 6px 0; }
        .hour-temp { font-size: 0.9rem; font-weight: 600; color: #64b5f6; }

        .daily {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(110px, 1fr));
            gap: 12px;
            margin-top: 12px;
        }

        .day {
            padding: 14px;
            background: linear-gradient(135deg, var(--bg-alt) 0%, rgba(255,255,255,0.02) 100%);
            border: 1px solid var(--border);
            border-radius: 10px;
            text-align: center;
        }

        .day-date { font-size: 0.75rem; color: var(--text-dim); margin-bottom: 8px; }
        .day-icon { font-size: 1.8rem; margin: 8px 0; }
        .day-temps { display: flex; justify-content: space-around; font-size: 0.8rem; margin-top: 8px; }
        .day-max { color: #64b5f6; font-weight: 600; }
        .day-min { color: var(--text-dim); }

        .alerts {
            margin-top: 16px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .alert {
            padding: 12px 14px;
            border-radius: 8px;
            border-left: 4px solid;
            font-size: 0.8rem;
            animation: slideIn 0.4s ease-out;
        }

        .alert-high { background: rgba(244,67,54,0.1); border-left-color: #f44336; color: #ef5350; }
        .alert-medium { background: rgba(255,152,0,0.1); border-left-color: #ff9800; color: #ffb74d; }
        .alert-low { background: rgba(30,136,229,0.1); border-left-color: #1e88e5; color: #64b5f6; }

        .loading {
            text-align: center;
            padding: 40px 20px;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .error {
            background: rgba(244,67,54,0.1);
            border: 1px solid #f44336;
            color: #ef5350;
            padding: 16px;
            border-radius: 10px;
            text-align: center;
            margin: 16px 0;
        }

        .source-badge {
            display: inline-block;
            padding: 4px 10px;
            background: rgba(30,136,229,0.15);
            border: 1px solid rgba(30,136,229,0.3);
            border-radius: 20px;
            font-size: 0.65rem;
            color: #64b5f6;
            margin-top: 12px;
        }

        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.7);
            z-index: 1000;
            overflow-y: auto;
            padding: 20px;
        }

        .modal.active { display: flex; align-items: center; justify-content: center; }

        .modal-content {
            background: var(--bg-alt);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            max-width: 400px;
            width: 100%;
            max-height: 80vh;
            overflow-y: auto;
        }

        .modal-title { font-size: 1.1rem; font-weight: 600; margin-bottom: 16px; }

        .api-option {
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: 8px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: var(--transition);
        }

        .api-option:hover { background: rgba(30,136,229,0.1); border-color: var(--accent); }
        .api-option.selected { background: rgba(30,136,229,0.2); border-color: var(--accent); }

        .api-name { font-weight: 600; font-size: 0.9rem; }
        .api-desc { font-size: 0.75rem; color: var(--text-dim); margin-top: 4px; }

        footer {
            text-align: center;
            padding: 16px 0;
            border-top: 1px solid var(--border);
            color: var(--text-dim);
            font-size: 0.75rem;
        }

        @media (max-width: 480px) {
            #app { padding: 12px; gap: 12px; }
            .temp-value { font-size: 3rem; }
            .stats { grid-template-columns: repeat(3, 1fr); gap: 8px; }
            .stat { padding: 10px 8px; }
            .daily { grid-template-columns: repeat(auto-fit, minmax(95px, 1fr)); }
            button { padding: 6px 10px; font-size: 0.75rem; }
        }

        @media (min-width: 1024px) and (orientation: landscape) {
            .main-container { grid-template-columns: 1fr 1fr; gap: 20px; }
            .stats { grid-template-columns: repeat(5, 1fr); }
        }
    </style>
</head>
<body>

<div id="app">
    <header>
        <div class="logo">☀️ Mini Weather</div>
        <div class="controls">
            <button id="location-btn" title="Get Location">📍</button>
            <button id="api-btn" title="API Source">🔌</button>
            <button id="unit-btn" title="°C/°F">°C</button>
            <button id="refresh-btn" title="Refresh">🔄</button>
        </div>
    </header>

    <div id="location-display" class="location-section" style="display: none;">
        <div class="location-info">
            <div class="location-name" id="loc-name">Loading...</div>
            <div class="location-coords" id="loc-coords">-</div>
            <div class="location-time" id="loc-time">-</div>
        </div>
    </div>

    <div id="weather-content" class="main-container">
        <div class="loading">
            <div class="spinner"></div>
            <p style="color: var(--text-dim);">Click 📍 to get started</p>
        </div>
    </div>

    <footer>
        <p>Mini Weather • Fast • Accurate • AI-Powered</p>
    </footer>
</div>

<div id="api-modal" class="modal">
    <div class="modal-content">
        <div class="modal-title">Weather Data Source</div>
        <div id="api-list"></div>
    </div>
</div>

<script src="app.js"></script>
</body>
</html>
