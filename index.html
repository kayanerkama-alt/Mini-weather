        body[data-theme="silver"] { --bg-primary: #2a2a2a; --bg-secondary: #3f3f3f; --text-primary: #e8e8e8; --accent: #a9a9a9; }

        body {
            background-color: var(--bg-primary);
            color: var(--text-primary);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overflow-x: hidden;
            transition: var(--transition);
        }

        html { scroll-behavior: smooth; }

        #app {
            min-height: 100vh;
            padding: 20px;
            display: flex;
            flex-direction: column;
            background: linear-gradient(135deg, var(--bg-primary) 0%, var(--bg-secondary) 100%);
        }

        .container { max-width: 1400px; margin: 0 auto; width: 100%; }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 0;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .logo-container {
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 300;
            letter-spacing: 2px;
            font-size: 1.3rem;
        }

        .animated-logo {
            width: 45px;
            height: 45px;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .sun {
            width: 30px;
            height: 30px;
            background: linear-gradient(135deg, #FFB300, #FF8C00);
            border-radius: 50%;
            position: relative;
            box-shadow: 0 0 20px var(--accent), 0 0 40px rgba(255, 140, 0, 0.3);
            animation: solarFlare 3s ease-in-out infinite;
        }

        .sun::before {
            content: '';
            position: absolute;
            width: 40px;
            height: 40px;
            border: 2px solid var(--accent-light);
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation: rotate 20s linear infinite;
            opacity: 0.6;
        }

        .sun::after {
            content: '';
            position: absolute;
            width: 50px;
            height: 50px;
            border: 1px dashed var(--accent-light);
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation: rotate 30s linear infinite reverse;
            opacity: 0.3;
        }

        .cloud {
            position: absolute;
            width: 35px;
            height: 20px;
            background: var(--text-secondary);
            border-radius: 10px;
            top: 15px;
            right: -5px;
            animation: cloudFloat 4s ease-in-out infinite;
            opacity: 0.8;
        }

        .cloud::before {
            content: '';
            position: absolute;
            width: 15px;
            height: 15px;
            background: var(--text-secondary);
            border-radius: 50%;
            top: -8px;
            left: 8px;
        }

        .cloud::after {
            content: '';
            position: absolute;
            width: 12px;
            height: 12px;
            background: var(--text-secondary);
            border-radius: 50%;
            top: -6px;
            right: 8px;
        }

        @keyframes solarFlare { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }
        @keyframes rotate { from { transform: translate(-50%, -50%) rotate(0deg); } to { transform: translate(-50%, -50%) rotate(360deg); } }
        @keyframes cloudFloat { 0%, 100% { transform: translateX(0); } 50% { transform: translateX(10px); } }

        .controls {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        button {
            padding: 8px 16px;
            border: 1px solid var(--border-color);
            background: var(--bg-secondary);
            color: var(--text-primary);
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: var(--transition);
            font-weight: 500;
            letter-spacing: 0.5px;
        }

        button:hover {
            background: var(--accent);
            border-color: var(--accent);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px var(--shadow);
        }

        button:active { transform: translateY(0); }

        .theme-btn { padding: 6px 12px; font-size: 0.75rem; }

        .theme-selector { position: relative; }

        .theme-dropdown {
            position: absolute;
            top: 100%;
            right: 0;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 12px;
            display: none;
            z-index: 1000;
            grid-template-columns: repeat(7, 1fr);
            gap: 10px;
            min-width: 400px;
            box-shadow: 0 8px 32px var(--shadow);
            max-height: 500px;
            overflow-y: auto;
        }

        .theme-dropdown.active { display: grid; }

        .theme-option {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            cursor: pointer;
            border: 3px solid transparent;
            transition: var(--transition);
            flex-shrink: 0;
        }

        .theme-option:hover { transform: scale(1.15); }
        .theme-option.active { border-color: var(--text-primary); box-shadow: 0 0 12px currentColor; }

        .main-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-bottom: 30px;
        }

        .weather-card {
            background: linear-gradient(135deg, var(--bg-secondary) 0%, rgba(255, 255, 255, 0.05) 100%);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 40px 30px;
            text-align: center;
            backdrop-filter: blur(10px);
            animation: slideIn 0.6s ease-out;
            box-shadow: 0 8px 32px var(--shadow);
        }

        @keyframes slideIn { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

        .garden-card {
            background: linear-gradient(135deg, #8B7355 0%, #6B5344 100%);
            border: 2px solid #4a3d34;
            border-radius: 16px;
            padding: 30px;
            position: relative;
            overflow: hidden;
            min-height: 400px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .garden-background {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(to bottom, #87ceeb 0%, #e0f6ff 100%);
            opacity: 0.3;
            z-index: 0;
        }

        .garden-content {
            position: relative;
            z-index: 2;
            text-align: center;
        }

        .garden-title {
            font-size: 1.5rem;
            margin-bottom: 20px;
            color: var(--text-primary);
            font-weight: 600;
        }

        .plant {
            font-size: 100px;
            margin: 20px 0;
            animation: grow 2s ease-in-out infinite;
            filter: drop-shadow(0 4px 8px rgba(0, 0, 0, 0.2));
        }

        .plant.thriving { filter: brightness(1.2) drop-shadow(0 4px 12px rgba(76, 175, 80, 0.4)); animation-duration: 1.5s; }
        .plant.healthy { filter: brightness(1) drop-shadow(0 4px 8px rgba(76, 175, 80, 0.2)); animation-duration: 2s; }
        .plant.stressed { filter: brightness(0.8) saturate(0.7) drop-shadow(0 4px 8px rgba(244, 67, 54, 0.2)); animation-duration: 3s; }
        .plant.wilted { filter: brightness(0.6) saturate(0.5) drop-shadow(0 4px 8px rgba(255, 152, 0, 0.2)); animation-duration: 4s; }

        @keyframes grow { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }

        .plant-status {
            margin-top: 15px;
            padding: 10px 15px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 8px;
            font-size: 0.9rem;
        }

        .location-info {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
            font-size: 0.95rem;
            color: var(--text-secondary);
        }

        .location-info button { padding: 4px 12px; font-size: 0.75rem; }

        .temperature-section { margin: 30px 0; }

        .temperature {
            font-size: 5.5rem;
            font-weight: 200;
            letter-spacing: -2px;
            margin: 0;
            background: linear-gradient(135deg, var(--accent-light), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .condition {
            font-size: 1.3rem;
            margin: 10px 0;
            text-transform: capitalize;
            color: var(--text-secondary);
            letter-spacing: 0.5px;
        }

        .feels-like { font-size: 0.95rem; color: var(--text-secondary); margin-top: 8px; }

        .quick-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 15px;
            margin-top: 30px;
            padding-top: 30px;
            border-top: 1px solid var(--border-color);
        }

        .stat-item {
            padding: 15px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            transition: var(--transition);
        }

        .stat-item:hover {
            background: rgba(255, 255, 255, 0.08);
            transform: translateY(-4px);
            box-shadow: 0 4px 16px var(--shadow);
        }

        .stat-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: 600;
            color: var(--accent-light);
        }

        .forecast-section { margin-top: 40px; }

        .section-title {
            font-size: 1.1rem;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 20px;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .section-title::before {
            content: '';
            width: 4px;
            height: 20px;
            background: var(--accent);
            border-radius: 2px;
        }

        .hourly-forecast {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding: 15px 0;
            margin-bottom: 30px;
            scroll-behavior: smooth;
        }

        .hourly-forecast::-webkit-scrollbar {
            height: 4px;
        }

        .hourly-forecast::-webkit-scrollbar-track {
            background: var(--bg-secondary);
            border-radius: 2px;
        }

        .hourly-forecast::-webkit-scrollbar-thumb {
            background: var(--accent);
            border-radius: 2px;
        }

        .hourly-item {
            flex-shrink: 0;
            padding: 15px 12px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            text-align: center;
            min-width: 90px;
            transition: var(--transition);
        }

        .hourly-item:hover {
            background: var(--accent);
            transform: translateY(-4px);
            box-shadow: 0 8px 16px var(--shadow);
        }

        .hourly-time {
            font-size: 0.7rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .hourly-icon { font-size: 1.8rem; margin: 8px 0; }
        .hourly-temp { font-size: 1rem; font-weight: 600; color: var(--accent-light); }

        .daily-forecast {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }

        .daily-item {
            padding: 20px;
            background: linear-gradient(135deg, var(--bg-secondary) 0%, rgba(255, 255, 255, 0.03) 100%);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            text-align: center;
            transition: var(--transition);
        }

        .daily-item:hover {
            background: linear-gradient(135deg, var(--accent) 0%, rgba(255, 255, 255, 0.1) 100%);
            transform: translateY(-6px);
            box-shadow: 0 12px 24px var(--shadow);
        }

        .daily-date {
            font-size: 0.85rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 10px;
        }

        .daily-icon { font-size: 2.5rem; margin: 12px 0; }
        .daily-condition { font-size: 0.9rem; color: var(--text-secondary); margin-bottom: 12px; text-transform: capitalize; }

        .daily-temps {
            display: flex;
            justify-content: space-around;
            font-size: 0.9rem;
        }

        .temp-max { color: var(--accent-light); font-weight: 600; }
        .temp-min { color: var(--text-secondary); }

        .detailed-info {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }

        .info-card {
            padding: 20px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            transition: var(--transition);
        }

        .info-card:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: var(--accent);
        }

        .info-title {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }

        .info-value {
            font-size: 1.8rem;
            font-weight: 600;
            color: var(--accent-light);
            margin-bottom: 4px;
        }

        .info-detail {
            font-size: 0.75rem;
            color: var(--text-secondary);
        }

        .alerts { margin-bottom: 30px; }

        .alert {
            padding: 15px 20px;
            border-radius: 10px;
            margin-bottom: 10px;
            border-left: 4px solid;
            animation: slideIn 0.4s ease-out;
        }

        .alert-warning {
            background: rgba(255, 152, 0, 0.1);
            border-left-color: #ff9800;
            color: #ffb74d;
        }

        .alert-info {
            background: rgba(30, 136, 229, 0.1);
            border-left-color: #1e88e5;
            color: #64b5f6;
        }

        .alert-danger {
            background: rgba(244, 67, 54, 0.1);
            border-left-color: #f44336;
            color: #ef5350;
        }

        .loading {
            text-align: center;
            padding: 60px 20px;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid var(--border-color);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .loading-text {
            color: var(--text-secondary);
            font-size: 0.95rem;
            letter-spacing: 1px;
        }

        .error {
            background: rgba(244, 67, 54, 0.1);
            border: 1px solid #f44336;
            color: #ef5350;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            margin-top: 30px;
        }

        .api-source {
            font-size: 0.75rem;
            color: var(--text-secondary);
            margin-top: 8px;
            opacity: 0.7;
        }

        footer {
            text-align: center;
            padding: 30px 20px;
            border-top: 1px solid var(--border-color);
            margin-top: 40px;
            color: var(--text-secondary);
            font-size: 0.85rem;
        }

        .privacy-notice {
            font-size: 0.75rem;
            color: var(--text-secondary);
            margin-top: 10px;
            padding-top: 15px;
            border-top: 1px solid var(--border-color);
        }

        .precision-indicator {
            display: inline-block;
            padding: 4px 8px;
            background: rgba(76, 175, 80, 0.2);
            border: 1px solid rgba(76, 175, 80, 0.5);
            border-radius: 4px;
            font-size: 0.7rem;
            color: #81c784;
            margin-left: 10px;
        }

        @media (max-width: 1200px) {
            .main-grid { grid-template-columns: 1fr; }
            .quick-stats { grid-template-columns: repeat(3, 1fr); }
        }

        @media (max-width: 768px) {
            .weather-card { padding: 30px 20px; }
            .temperature { font-size: 4rem; }
            .quick-stats { grid-template-columns: repeat(2, 1fr); }
            header { flex-direction: column; gap: 15px; }
            .controls { width: 100%; justify-content: center; }
            .daily-forecast { grid-template-columns: repeat(2, 1fr); }
            .detailed-info { grid-template-columns: 1fr; }
            .theme-dropdown { grid-template-columns: repeat(5, 1fr); min-width: 300px; }
        }

        @media (max-width: 480px) {
            #app { padding: 15px; }
            .weather-card { padding: 20px 15px; margin-bottom: 20px; }
            .temperature { font-size: 3rem; }
            .quick-stats { grid-template-columns: repeat(2, 1fr); gap: 10px; }
            .stat-item { padding: 12px; }
            .stat-value { font-size: 1.2rem; }
            .hourly-forecast { gap: 8px; }
            .hourly-item { min-width: 70px; padding: 10px 8px; }
            .daily-forecast { grid-template-columns: 1fr; }
            .detailed-info { grid-template-columns: 1fr; }
            .theme-dropdown { grid-template-columns: repeat(4, 1fr); }
            .section-title { font-size: 0.95rem; }
            .temperature-section { margin: 20px 0; }
        }
    </style>
</head>
<body data-theme="dark">

<div id="app">
    <header>
        <div class="logo-container">
            <div class="animated-logo">
                <div class="sun">
                    <div class="cloud"></div>
                </div>
            </div>
            <span>Mini Weather</span>
        </div>
        <div class="controls">
            <div class="theme-selector">
                <button class="theme-btn" id="theme-toggle">🎨 Themes</button>
                <div class="theme-dropdown" id="theme-dropdown"></div>
            </div>
            <button id="refresh-btn">🔄 Refresh</button>
            <button id="settings-btn">⚙️ Units (°C)</button>
            <button id="notification-btn">🔔 Alerts</button>
        </div>
    </header>

    <div class="container">
        <div class="main-grid">
            <div>
                <div id="weather-content">
                    <div class="loading">
                        <div class="spinner"></div>
                        <p class="loading-text">Fetching most accurate weather data...</p>
                    </div>
                </div>
            </div>
            <div>
                <div class="garden-card">
                    <div class="garden-background"></div>
                    <div class="garden-content">
                        <div class="garden-title">🌱 Condition Garden</div>
                        <div class="plant" id="garden-plant">🌿</div>
                        <div class="plant-status" id="garden-status">Initializing...</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer>
        <p>Mini Weather — Most Accurate Global Weather Data</p>
        <div class="privacy-notice">
            🔒 Privacy: No tracking. Multi-source API: Open-Meteo + Weather.gov + Local Climate Data
        </div>
    </footer>
</div>

<script src="weather.js"></script>
</body>
</html>
