<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <meta name="description" content="Mini Weather - Accurate, Fast, Privacy-First Weather App">
    <meta name="theme-color" content="#1e88e5">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <title>Mini Weather</title>
    <link rel="manifest" href="manifest.json">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html { -webkit-user-select: none; user-select: none; scroll-behavior: smooth; }
        body { -webkit-user-select: text; user-select: text; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
        :root {
            --safe-top: max(12px, env(safe-area-inset-top));
            --safe-bottom: max(12px, env(safe-area-inset-bottom));
            --safe-left: max(8px, env(safe-area-inset-left));
            --safe-right: max(8px, env(safe-area-inset-right));
            --bg: #0a0a0a; --bg-alt: #141414; --bg-card: #1a1a1a;
            --text: #f0f0f0; --text-dim: #888888; --text-muted: #555555;
            --accent: #1e88e5; --accent-light: #64b5f6; --accent-glow: rgba(30,136,229,0.25);
            --border: #2a2a2a; --border-light: #333333;
            --success: #4caf50; --warning: #ff9800; --danger: #f44336;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            --radius: 12px; --radius-sm: 8px; --shadow: 0 4px 24px rgba(0,0,0,0.4);
        }
        @media (max-width: 480px) { :root { font-size: 14px; } }
        @media (min-width: 481px) and (max-width: 768px) { :root { font-size: 15px; } }
        @media (min-width: 769px) { :root { font-size: 16px; } }
        [data-theme="light"] { --bg: #f5f7fa; --bg-alt: #ffffff; --bg-card: #ffffff; --text: #1a1a2e; --text-dim: #666666; --text-muted: #999999; --accent: #1565c0; --accent-light: #1e88e5; --accent-glow: rgba(21,101,192,0.15); --border: #e0e0e0; --border-light: #eeeeee; --shadow: 0 4px 24px rgba(0,0,0,0.1); }
        body { background: var(--bg); color: var(--text); overflow-x: hidden; min-height: 100vh; display: flex; flex-direction: column; }
        header { background: var(--bg-card); border-bottom: 1px solid var(--border); padding: var(--safe-top) var(--safe-left) 12px var(--safe-right); position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 8px rgba(0,0,0,0.2); }
        .header-content { display: flex; justify-content: space-between; align-items: center; gap: 12px; max-width: 1200px; margin: 0 auto; width: 100%; }
        .header-title { font-size: 1.3rem; font-weight: 600; flex: 1; }
        .header-buttons { display: flex; gap: 8px; align-items: center; }
        button { background: var(--accent); color: white; border: none; padding: 8px 12px; border-radius: var(--radius-sm); cursor: pointer; font-size: 0.9rem; transition: var(--transition); font-weight: 500; }
        button:hover { opacity: 0.9; transform: translateY(-1px); }
        button:active { transform: translateY(0); }
        main { flex: 1; padding: 12px var(--safe-left) var(--safe-bottom) var(--safe-right); max-width: 1200px; width: 100%; margin: 0 auto; }
        .card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; margin-bottom: 12px; transition: var(--transition); }
        .card:hover { border-color: var(--accent); box-shadow: 0 4px 12px var(--accent-glow); }
        .card-title { font-size: 1.1rem; font-weight: 600; margin-bottom: 12px; color: var(--accent); }
        .grid-2 { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 12px; }
        .grid-3 { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 12px; }
        .grid-4 { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; }
        @media (max-width: 480px) { .grid-2, .grid-3, .grid-4 { grid-template-columns: 1fr; } .card { padding: 12px; } .header-title { font-size: 1.1rem; } }
        @media (min-width: 481px) and (max-width: 768px) { .grid-3, .grid-4 { grid-template-columns: repeat(2, 1fr); } }
        .weather-main { text-align: center; padding: 20px 0; }
        .temp-display { font-size: 3.5rem; font-weight: 700; margin: 10px 0; background: linear-gradient(135deg, var(--accent), var(--accent-light)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        .condition-text { font-size: 1.2rem; color: var(--text-dim); margin: 8px 0; }
        .feels-like { font-size: 0.95rem; color: var(--text-muted); }
        .forecast-item { background: var(--bg-alt); border: 1px solid var(--border-light); border-radius: var(--radius-sm); padding: 12px; text-align: center; cursor: pointer; transition: var(--transition); }
        .forecast-item:hover { background: var(--bg-card); border-color: var(--accent); transform: translateY(-2px); }
        .forecast-icon { font-size: 2rem; margin: 8px 0; }
        .forecast-temp { font-weight: 600; margin: 8px 0; }
        .forecast-detail { font-size: 0.8rem; color: var(--text-dim); }
        .garden-container { text-align: center; padding: 20px; background: linear-gradient(135deg, var(--bg-alt), var(--bg-card)); border-radius: var(--radius); margin-bottom: 12px; }
        .garden-plant { font-size: 4rem; margin: 20px 0; animation: grow 0.6s ease-out; }
        @keyframes grow { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .garden-stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(100px, 1fr)); gap: 12px; margin-top: 16px; }
        .stat-box { background: var(--bg); padding: 12px; border-radius: var(--radius-sm); border: 1px solid var(--border); }
        .stat-label { font-size: 0.8rem; color: var(--text-dim); margin-bottom: 4px; }
        .stat-value { font-size: 1.3rem; font-weight: 600; color: var(--accent); }
        .settings-panel { position: fixed; top: 0; right: -100%; width: 100%; max-width: 400px; height: 100vh; background: var(--bg-card); border-left: 1px solid var(--border); box-shadow: var(--shadow); transition: right 0.3s ease; z-index: 1000; overflow-y: auto; padding-top: var(--safe-top); }
        .settings-panel.active { right: 0; }
        .settings-header { display: flex; justify-content: space-between; align-items: center; padding: 16px; border-bottom: 1px solid var(--border); position: sticky; top: 0; background: var(--bg-card); }
        .settings-content { padding: 16px; }
        .settings-section { margin-bottom: 24px; padding-bottom: 16px; border-bottom: 1px solid var(--border-light); }
        .settings-section h3 { margin: 0 0 12px 0; font-size: 0.95rem; color: var(--accent); }
        .setting-item { display: flex; align-items: center; gap: 12px; padding: 8px 0; cursor: pointer; user-select: none; }
        .setting-item input[type="checkbox"], .setting-item input[type="radio"] { width: 18px; height: 18px; cursor: pointer; }
        .setting-item select { background: var(--bg); color: var(--text); border: 1px solid var(--border); padding: 6px 8px; border-radius: 4px; cursor: pointer; flex: 1; }
        .location-search { position: relative; margin-bottom: 12px; }
        .location-input { width: 100%; padding: 10px 12px; background: var(--bg); color: var(--text); border: 1px solid var(--border); border-radius: var(--radius-sm); font-size: 0.95rem; }
        .location-input::placeholder { color: var(--text-muted); }
        .location-suggestions { position: absolute; top: 100%; left: 0; right: 0; background: var(--bg-card); border: 1px solid var(--border); border-top: none; border-radius: 0 0 var(--radius-sm) var(--radius-sm); max-height: 200px; overflow-y: auto; z-index: 10; }
        .location-suggestion { padding: 10px 12px; cursor: pointer; border-bottom: 1px solid var(--border-light); transition: var(--transition); }
        .location-suggestion:hover { background: var(--bg-alt); color: var(--accent); }
        #toast { position: fixed; bottom: var(--safe-bottom); left: var(--safe-left); right: var(--safe-right); background: var(--accent); color: white; padding: 12px 16px; border-radius: var(--radius-sm); opacity: 0; transform: translateY(20px); transition: var(--transition); pointer-events: none; z-index: 999; max-width: 400px; margin: 0 auto; }
        #toast.show { opacity: 1; transform: translateY(0); }
        .loading { display: inline-block; width: 20px; height: 20px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .alert { padding: 12px; border-radius: var(--radius-sm); margin-bottom: 8px; border-left: 4px solid; }
        .alert-info { background: rgba(33, 150, 243, 0.1); border-left-color: #2196f3; color: #2196f3; }
        .alert-warning { background: rgba(255, 152, 0, 0.1); border-left-color: #ff9800; color: #ff9800; }
        .alert-danger { background: rgba(244, 67, 54, 0.1); border-left-color: #f44336; color: #f44336; }
        .modal { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.7); display: none; align-items: center; justify-content: center; z-index: 2000; padding: 16px; }
        .modal.active { display: flex; }
        .modal-content { background: var(--bg-card); border-radius: var(--radius); padding: 20px; max-width: 500px; width: 100%; max-height: 90vh; overflow-y: auto; position: relative; }
        .modal-close { position: absolute; top: 12px; right: 12px; background: none; border: none; font-size: 1.5rem; cursor: pointer; color: var(--text-dim); padding: 0; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; }
        .modal-close:hover { color: var(--text); }
        .ai-summary { background: linear-gradient(135deg, var(--accent-glow), transparent); border: 1px solid var(--accent); border-radius: var(--radius); padding: 16px; margin-bottom: 12px; }
        .ai-summary-title { color: var(--accent); font-weight: 600; margin-bottom: 8px; display: flex; align-items: center; gap: 8px; }
        .ai-summary-text { color: var(--text); line-height: 1.6; font-size: 0.95rem; }
        @media (prefers-reduced-motion: reduce) { * { animation-duration: 0.01ms !important; animation-iteration-count: 1 !important; transition-duration: 0.01ms !important; } }
        @media (prefers-color-scheme: light) { :root { --bg: #f5f7fa; --bg-alt: #ffffff; --bg-card: #ffffff; --text: #1a1a2e; --text-dim: #666666; --text-muted: #999999; --accent: #1565c0; --border: #e0e0e0; --border-light: #eeeeee; } }
    </style>
</head>
<body data-theme="dark">
    <header>
        <div class="header-content">
            <div class="header-title">🌤️ Mini Weather</div>
            <div class="header-buttons">
                <button id="location-btn" title="Search Location">📍</button>
                <button id="theme-btn" title="Themes">🎨</button>
                <button id="settings-btn" title="Settings">⚙️</button>
            </div>
        </div>
    </header>
    <main>
        <div class="location-search" id="location-search-container" style="display:none;">
            <input type="text" class="location-input" id="location-input" placeholder="Search location...">
            <div class="location-suggestions" id="location-suggestions"></div>
        </div>
        <div class="card" id="weather-card">
            <div class="weather-main">
                <div class="condition-text">Loading weather...</div>
                <div class="loading"></div>
            </div>
        </div>
        <div class="ai-summary" id="ai-summary" style="display:none;">
            <div class="ai-summary-title">🤖 AI Summary</div>
            <div class="ai-summary-text" id="ai-summary-text"></div>
        </div>
        <div id="alerts-container"></div>
        <div class="card" id="garden-card" style="display:none;">
            <div class="card-title">🌱 Virtual Garden</div>
            <div class="garden-container">
                <div class="garden-plant" id="garden-plant">🌱</div>
                <div id="garden-status"></div>
                <div class="garden-stats" id="garden-stats"></div>
            </div>
        </div>
        <div class="card" id="hourly-card" style="display:none;">
            <div class="card-title">⏰ Next 48 Hours</div>
            <div class="grid-4" id="hourly-forecast"></div>
        </div>
        <div class="card" id="daily-card" style="display:none;">
            <div class="card-title">📅 14-Day Forecast</div>
            <div class="grid-2" id="daily-forecast"></div>
        </div>
        <div class="card" id="details-card" style="display:none;">
            <div class="card-title">📊 Detailed Information</div>
            <div class="grid-3" id="details-grid"></div>
        </div>
    </main>
    <div id="theme-dropdown" style="position:fixed;top:60px;right:12px;background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:12px;max-width:300px;max-height:400px;overflow-y:auto;display:none;z-index:500;">
        <div id="theme-grid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(40px,1fr));gap:8px;"></div>
    </div>
    <div class="settings-panel" id="settings-panel">
        <div class="settings-header">
            <h2 style="margin:0;font-size:1.2rem;">⚙️ Settings</h2>
            <button id="close-settings" style="background:none;border:none;font-size:1.5rem;cursor:pointer;color:var(--text-dim);padding:0;width:32px;height:32px;">✕</button>
        </div>
        <div class="settings-content">
            <div class="settings-section">
                <h3>🎨 Display</h3>
                <label class="setting-item"><span>Temperature Unit:</span><select id="temp-unit-select"><option value="C">Celsius (°C)</option><option value="F">Fahrenheit (°F)</option></select></label>
                <label class="setting-item"><span>Wind Unit:</span><select id="wind-unit-select"><option value="kmh">km/h</option><option value="mph">mph</option></select></label>
            </div>
            <div class="settings-section">
                <h3>🔔 Notifications</h3>
                <label class="setting-item"><input type="checkbox" id="notifications-enabled"><span>Enable Alerts</span></label>
                <label class="setting-item"><input type="checkbox" id="alert-uv" checked><span>UV Alerts</span></label>
                <label class="setting-item"><input type="checkbox" id="alert-wind" checked><span>Wind Alerts</span></label>
                <label class="setting-item"><input type="checkbox" id="alert-rain" checked><span>Rain Alerts</span></label>
                <label class="setting-item"><input type="checkbox" id="alert-heat" checked><span>Heat Alerts</span></label>
                <label class="setting-item"><input type="checkbox" id="alert-cold" checked><span>Cold Alerts</span></label>
            </div>
            <div class="settings-section">
                <h3>🌱 Virtual Garden</h3>
                <label class="setting-item"><input type="checkbox" id="garden-enabled" checked><span>Show Garden</span></label>
                <button id="reset-garden-btn" style="width:100%;margin-top:8px;">Reset Garden</button>
            </div>
            <div class="settings-section">
                <h3>💾 Data</h3>
                <button id="export-data-btn" style="width:100%;margin-bottom:8px;">Export Data</button>
                <button id="clear-data-btn" style="width:100%;background:#f44336;">Clear All Data</button>
            </div>
            <div class="settings-section">
                <h3>ℹ️ About</h3>
                <p style="margin:0;font-size:0.9rem;color:var(--text-dim);">Mini Weather v2.0</p>
                <p style="margin:8px 0 0 0;font-size:0.85rem;color:var(--text-muted);">All data stored locally. No tracking.</p>
            </div>
        </div>
    </div>
    <div class="modal" id="day-modal">
        <div class="modal-content">
            <button class="modal-close" id="modal-close">←</button>
            <div id="modal-body"></div>
        </div>
    </div>
    <div id="toast"></div>
    <script src="app.js"></script>
</body>
</html>
